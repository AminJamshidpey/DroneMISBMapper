<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erft River - Section 18</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 24px;
      color: #243746;
    }
    h1 {
      color: #1f4e79;
      text-align: center;
      margin: 8px 0 6px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 28px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .photo-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,.18);
    }
    .photo-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .photo-card img {
      display: block;
      width: 100%;
      height: 360px;
      object-fit: cover;
      background: #e8edf2;
    }
    .caption {
      padding: 12px 14px;
      font-weight: 600;
      text-align: center;
    }
    .fallback {
      display: none;
      min-height: 240px;
      padding: 24px;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #fff;
      color: #1f4e79;
    }
    @media (max-width: 700px) {
      body { padding: 14px; }
      .photo-card img { height: auto; }
    }
  </style>
</head>
<body>
  <h1>Erft River Monitoring</h1>
  <div class="subtitle">Section 18 – Field Photos</div>

  <div class="gallery">
    <div class="photo-card">
      <a class="photo-link" href="https://drive.google.com/file/d/1kvdhdItArOjw_IH4xNzcsrrIFZvafcMK/view" target="_blank" rel="noopener">
        <img
          src="https://drive.google.com/thumbnail?id=1kvdhdItArOjw_IH4xNzcsrrIFZvafcMK&sz=w1600"
          alt="Section 18 - Photo 1"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="fallback">Photo 1 could not be loaded here.<br>Click to open it in Google Drive.</div>
        <div class="caption">Photo 1</div>
      </a>
    </div>

    <div class="photo-card">
      <a class="photo-link" href="https://drive.google.com/file/d/1vOi0RGnIJuyTmRcKvbcw-UaS9Mq2-NCm/view" target="_blank" rel="noopener">
        <img
          src="https://drive.google.com/thumbnail?id=1vOi0RGnIJuyTmRcKvbcw-UaS9Mq2-NCm&sz=w1600"
          alt="Section 18 - Photo 2"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="fallback">Photo 2 could not be loaded here.<br>Click to open it in Google Drive.</div>
        <div class="caption">Photo 2</div>
      </a>
    </div>
  </div>
</body>
</html>
