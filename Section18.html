<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Erft River - Section 18</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #243746;
      padding: 10px;
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    h1 {
      color: #1f4e79;
      font-size: 20px;
      line-height: 1.2;
      margin: 2px 0 3px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      line-height: 1.3;
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .photo-card {
      width: 100%;
      background: #fff;
      border-radius: 9px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.16);
    }

    .photo-link {
      display: block;
      width: 100%;
      text-decoration: none;
      color: inherit;
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: 220px;
      object-fit: cover;
      object-position: center;
      background: #e8edf2;
    }

    .caption {
      padding: 8px 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      background: #fff;
    }

    .fallback {
      display: none;
      min-height: 180px;
      padding: 20px;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #fff;
      color: #1f4e79;
      font-size: 14px;
      line-height: 1.5;
    }

    .photo-card:hover {
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.22);
    }

    @media (min-width: 850px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photo-card img {
        height: 300px;
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 8px;
      }

      h1 {
        font-size: 18px;
      }

      .subtitle {
        font-size: 13px;
      }

      .gallery {
        gap: 10px;
      }

      .photo-card img {
        height: 190px;
      }

      .caption {
        padding: 7px 8px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Erft River Monitoring</h1>
    <p class="subtitle">Section 18 – Field Photos</p>
  </div>

  <div class="gallery">

    <div class="photo-card">
      <a
        class="photo-link"
        href="https://drive.google.com/file/d/1kvdhdItArOjw_IH4xNzcsrrIFZvafcMK/view"
        target="_blank"
        rel="noopener"
      >
        <img
          src="https://drive.google.com/thumbnail?id=1kvdhdItArOjw_IH4xNzcsrrIFZvafcMK&sz=w1600"
          alt="Erft River Section 18 - Photo 1"
          loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        >

        <div class="fallback">
          Photo 1 could not be loaded here.<br>
          Click to open it in Google Drive.
        </div>

        <div class="caption">Photo 1</div>
      </a>
    </div>

    <div class="photo-card">
      <a
        class="photo-link"
        href="https://drive.google.com/file/d/1vOi0RGnIJuyTmRcKvbcw-UaS9Mq2-NCm/view"
        target="_blank"
        rel="noopener"
      >
        <img
          src="https://drive.google.com/thumbnail?id=1vOi0RGnIJuyTmRcKvbcw-UaS9Mq2-NCm&sz=w1600"
          alt="Erft River Section 18 - Photo 2"
          loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        >

        <div class="fallback">
          Photo 2 could not be loaded here.<br>
          Click to open it in Google Drive.
        </div>

        <div class="caption">Photo 2</div>
      </a>
    </div>

  </div>

</body>
</html>
